default:
  image: docker.gitlab.gwdg.de/eoltman/docker-ext:28.3.3
  services:
    - name: docker.io/library/docker:28.3.3-dind
      alias: docker
      command: ["--mtu=1450"]
  tags:
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

stages:
  - test
  - build
  - deploy

variables:
  # Specify to Docker where to create the certificates. Docker
  # creates them automatically on boot, and creates
  # `/certs/client` to share between the service and job
  # container, thanks to volume mount from config.toml
  DOCKER_TLS_CERTDIR: "/certs"
  CONTAINER_TEST_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest

.test_rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "testbed"
    - if: $CI_COMMIT_BRANCH == "production"
    - if: $CI_COMMIT_TAG == "deploy-prod"

.node_job:
  stage: test
  image: node:20-bookworm
  services: []
  tags:
    - docker
  before_script:
    - corepack enable
    - yarn --version
    - yarn install --immutable
  cache:
    key: "yarn-${CI_COMMIT_REF_SLUG}"
    paths:
      - .yarn/cache
      - .yarn/unplugged
      - node_modules/.cache

test_unit_contracts:
  extends:
    - .node_job
    - .test_rules
  script:
    - yarn lint
    - mkdir -p test-reports
    - yarn vitest run tests/unit --reporter=default --reporter=junit --outputFile.junit=test-reports/unit-junit.xml
  artifacts:
    when: always
    paths:
      - test-reports/unit-junit.xml
    reports:
      junit:
        - test-reports/unit-junit.xml

test_backend_api_contracts:
  extends:
    - .node_job
    - .test_rules
  script:
    - mkdir -p test-reports
    - PLAYWRIGHT_JUNIT_OUTPUT_FILE=test-reports/e2e-api-junit.xml yarn test:e2e:api --workers=1 --reporter=list,junit
    - PLAYWRIGHT_JUNIT_OUTPUT_FILE=test-reports/e2e-api-edge-junit.xml yarn test:e2e:api:edge --workers=1 --reporter=list,junit
  artifacts:
    when: always
    paths:
      - test-reports/e2e-api-junit.xml
      - test-reports/e2e-api-edge-junit.xml
    reports:
      junit:
        - test-reports/e2e-api-junit.xml
        - test-reports/e2e-api-edge-junit.xml

test_browser_smoke:
  extends: .node_job
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "testbed"
  script:
    - mkdir -p test-reports
    - npx playwright install --with-deps chromium
    - PLAYWRIGHT_JUNIT_OUTPUT_FILE=test-reports/e2e-smoke-junit.xml yarn test:e2e:smoke --workers=1 --reporter=list,junit
  artifacts:
    when: always
    paths:
      - test-reports/e2e-smoke-junit.xml
    reports:
      junit:
        - test-reports/e2e-smoke-junit.xml

# Build a docker image.
.build_docker:
  stage: build
  variables:
    AUTH_ORIGIN: https://${DEPLOY_SERVER}
  script:
    - grep -vi secret .env.tmpl | envsubst > .env
    - export NODE_OPTIONS="--max-old-space-size=4096"   # 🟢 Increase Node heap size
    - docker build --pull --tag $CONTAINER_TEST_IMAGE .
    - docker push $CONTAINER_TEST_IMAGE

build_docker-staging:
  environment:
    name: testbed
    action: prepare
    url: https://testbed.av-efi.net
  rules:
    - if: $CI_COMMIT_BRANCH == "testbed"
  extends: .build_docker

build_docker-production:
  environment:
    name: production
    action: prepare
    url: https://www.av-efi.net
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
    - if: $CI_COMMIT_TAG == "deploy-prod"
  extends: .build_docker

.deploy:
  stage: deploy
  variables:
    AUTH_ORIGIN: https://${DEPLOY_SERVER}
  before_script:
    # Install required packages
    - apk add --no-cache openssh-client
    # Setup SSH
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - eval $(ssh-agent -s)
    - base64 -d "$SSH_PRIVATE_KEY" | ssh-add -
    - cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
  script:
    - envsubst < docker-compose.tmpl > docker-compose.yml
    - cat docker-compose.yml
    - echo "NUXT_PUBLIC_SITE_URL=$NUXT_PUBLIC_SITE_URL"
    - echo "MAIL_USER=$MAIL_USER"
    - echo "MAIL_PASSWORD=$MAIL_PASSWORD"
    - echo "MAIL_TO=$MAIL_TO"
    - echo "MAIL_TO_2=$MAIL_TO_2"
    - echo "NUXT_PUBLIC_DISABLE_INDEXING=$NUXT_PUBLIC_DISABLE_INDEXING"
    - echo "NUXT_PUBLIC_BOT_UA_ALLOWLIST=$NUXT_PUBLIC_BOT_UA_ALLOWLIST"
    - envsubst < .env.tmpl > .env
    # Create the new deployment directory if it doesn't exist
    - ssh $DEPLOY_USER@$DEPLOY_SERVER "mkdir -p $DEPLOY_PATH"
    # Upload docker-compose.yml to server
    - scp docker-compose.yml .env $DEPLOY_USER@$DEPLOY_SERVER:$DEPLOY_PATH/
    # Login to Docker registry and restart containers
    - ssh $DEPLOY_USER@$DEPLOY_SERVER "cd $DEPLOY_PATH && 
      echo 'Logging into registry $CI_REGISTRY' &&
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      echo 'Pulling latest images' &&
      docker compose pull &&
      echo 'Starting containers' &&
      docker compose up -d"

deploy-staging:
  environment:
    name: testbed
    url: https://testbed.av-efi.net
  rules:
    - if: $CI_COMMIT_BRANCH == "testbed"
  extends: .deploy

deploy-production:
  environment:
    name: production
    url: https://www.av-efi.net
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
    - if: $CI_COMMIT_TAG == "deploy-prod"
  extends: .deploy
